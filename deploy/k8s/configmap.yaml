apiVersion: v1
kind: ConfigMap
metadata:
  name: clawserver-config
  labels:
    app: clawserver
data:
  config.yaml: |
    server:
      bind: "0.0.0.0:8080"
      worker_threads: 0
      body_limit_bytes: 1048576
      request_timeout_secs: 60
      sse_keep_alive_secs: 15
      graceful_shutdown_secs: 30
      tcp_keepalive_secs: 75
      tcp_nodelay: true

    rate_limit:
      enabled: true
      per_second: 50000
      burst: 100000

    circuit_breaker:
      failure_ratio: 0.5
      min_samples: 50
      rolling_window_secs: 10
      open_duration_secs: 15
      half_open_max_probes: 5

    redis:
      urls:
        - "redis://redis-cluster:6379"
      pool_size: 64
      connect_timeout_ms: 3000
      command_timeout_ms: 2000
      session_prefix: "claw:sess:"
      session_ttl_secs: 7200
      memory_max_turns: 40

    llm:
      default_provider: "openai"
      providers:
        openai:
          base_url: "http://127.0.0.1:9090/v1"
          api_key_env: "OPENAI_API_KEY"
          pool_idle_per_host: 64
          pool_max_idle_secs: 90
          request_timeout_secs: 120
          connect_timeout_secs: 5
          default_model: "gpt-4o-mini"
      retry:
        max_attempts: 3
        base_backoff_ms: 100
        max_backoff_ms: 2000

    buffer:
      channel_size: 256

    queue:
      capacity: 4096
      enqueue_timeout_ms: 50

    observability:
      log_level: "info,clawserver=debug"
      log_format: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clawserver-tasks
  labels:
    app: clawserver
data:
  chat.yaml: |
    name: chat
    enabled: true
    llm:
      provider: openai
      model: gpt-4o-mini
      temperature: 0.7
      max_tokens: 2048
    prompt:
      system: |
        你是 ClawServer 的通用对话助手。
      user_template: "{{content}}"
    memory:
      enabled: true
      max_turns: 20
    timeout_secs: 120
