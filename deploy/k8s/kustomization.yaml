apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: clawserver

resources:
  - configmap.yaml
  - deployment.yaml
  - service.yaml

images:
  - name: clawserver
    newName: clawserver/clawserver
    newTag: latest

secretGenerator:
  - name: clawserver-secret
    literals:
      - openai_api_key=sk-placeholder
