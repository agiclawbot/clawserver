apiVersion: apps/v1
kind: Deployment
metadata:
  name: clawserver
  labels:
    app: clawserver
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: clawserver
  template:
    metadata:
      labels:
        app: clawserver
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: clawserver
          image: clawserver:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: CLAW_CONFIG_DIR
              value: /app/config
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clawserver-secret
                  key: openai_api_key
            - name: RUST_LOG
              value: "info,clawserver=debug"
          resources:
            requests:
              cpu: "2"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "1Gi"
          volumeMounts:
            - name: config
              mountPath: /app/config/config.yaml
              subPath: config.yaml
            - name: tasks
              mountPath: /app/config/tasks/chat.yaml
              subPath: chat.yaml
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: clawserver-config
            items:
              - key: config.yaml
                path: config.yaml
        - name: tasks
          configMap:
            name: clawserver-tasks
            items:
              - key: chat.yaml
                path: chat.yaml
