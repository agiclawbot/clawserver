name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: fmt
        run: cargo fmt --all --check

      - name: clippy
        run: cargo clippy --all-targets --workspace --all-features

      - name: check
        run: cargo check --all-targets --workspace --all-features

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview

      - name: test
        run: cargo test --all-targets --workspace --all-features

  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: build release
        run: cargo build --release --bin clawserver --bin clawctl

      - name: upload binary
        uses: actions/upload-artifact@v4
        with:
          name: clawserver-x86_64-unknown-linux-gnu
          path: |
            target/release/clawserver
            target/release/clawctl

  docker:
    runs-on: ubuntu-latest
    needs: [check, test, build-release]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: build image
        run: docker build -t clawserver:latest .
